services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gabi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-secure-password}
      POSTGRES_DB: ${POSTGRES_DB:-gabi_studio}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gabi_admin} -d ${POSTGRES_DB:-gabi_studio}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gabi_admin}:${POSTGRES_PASSWORD:-your-secure-password}@db:5432/${POSTGRES_DB:-gabi_studio}
      DIRECT_URL: postgresql://${POSTGRES_USER:-gabi_admin}:${POSTGRES_PASSWORD:-your-secure-password}@db:5432/${POSTGRES_DB:-gabi_studio}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-local-only}
      CORS_ALLOWED_ORIGIN: http://localhost:3000
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      CRON_SECRET: ${CRON_SECRET:-change-me-local-only}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
