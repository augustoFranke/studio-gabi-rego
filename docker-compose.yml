services:
  # ==================== Next.js Application ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gabi_studio_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gabi_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gabi_studio}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gabi_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== PostgreSQL Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: gabi_studio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gabi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gabi_studio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - gabi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gabi_admin} -d ${POSTGRES_DB:-gabi_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==================== Networks ====================
networks:
  gabi_network:
    driver: bridge

# ==================== Volumes ====================
volumes:
  postgres_data:
    driver: local
